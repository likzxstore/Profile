<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Desarjiver - Admin Tourney FF</title>
<style>
/* CSS sama kayak tadi, aku skip biar nggak panjang */
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Segoe UI', Arial, sans-serif;
  background: #0a0e1a;
  color: white;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
  overflow: hidden;
  position: relative;
}
#particles { position: absolute; width: 100%; height: 100%; top: 0; left: 0; z-index: 0; }
.particle { position: absolute; width: 2px; height: 2px; background: #22c55e; border-radius: 50%; opacity: 0.6; animation: float 8s infinite ease-in-out; }
@keyframes float { 0%, 100% { transform: translateY(0) translateX(0); } 33% { transform: translateY(-100px) translateX(50px); } 66% { transform: translateY(50px) translateX(-50px); } }
.card {
  background: rgba(30, 41, 59, 0.9);
  backdrop-filter: blur(10px);
  padding: 35px 25px;
  border-radius: 25px;
  text-align: center;
  box-shadow: 0 0 50px rgba(34, 197, 94, 0.4);
  width: 100%;
  max-width: 380px;
  border: 1px solid #334155;
  opacity: 0;
  transform: scale(0.5) rotateX(90deg);
  animation: portal 1s ease-out 0.3s forwards;
  position: relative;
  z-index: 1;
}
@keyframes portal {
 0% { opacity: 0; transform: scale(0.5) rotateX(90deg); filter: blur(10px); }
 60% { opacity: 1; transform: scale(1.05) rotateX(0deg); }
 100% { opacity: 1; transform: scale(1) rotateX(0deg); filter: blur(0); }
}
img {
  width: 110px;
  height: 110px;
  border-radius: 50%;
  border: 4px solid #22c55e;
  margin-bottom: 15px;
  object-fit: cover;
  animation: glowPulse 2s ease-in-out infinite;
}
@keyframes glowPulse {
 0%, 100% { box-shadow: 0 0 20px #22c55e, 0 0 40px #22c55e; }
 50% { box-shadow: 0 0 40px #22c55e, 0 0 80px #22c55e; }
}
h2 { 
  margin: 10px 0 5px; 
  font-size: 24px; 
  overflow: hidden;
  white-space: nowrap;
  border-right: 3px solid #22c55e;
  width: 0;
  animation: typing 2s steps(20) 1s forwards, blink 0.7s infinite;
}
@keyframes typing { to { width: 100%; } }
@keyframes blink { 50% { border-color: transparent; } }
p { color: #94a3b8; font-size: 14px; margin: 15px 0 25px; opacity: 0; animation: fadeUp 0.8s ease 2.5s forwards; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
.btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
  color: #0f172a;
  padding: 14px;
  margin: 10px 0;
  border-radius: 12px;
  text-decoration: none;
  font-weight: bold;
  font-size: 16px;
  opacity: 0;
  transform: translateY(50px) scale(0.8);
  animation: bounceIn 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards;
  transition: 0.3s;
  position: relative;
  overflow: hidden;
}
.btn:nth-child(4) { animation-delay: 2.8s; }
.btn:nth-child(5) { animation-delay: 3s; }
.btn:nth-child(6) { animation-delay: 3.2s; }
.btn:nth-child(7) { animation-delay: 3.4s; }
@keyframes bounceIn {
 0% { opacity: 0; transform: translateY(50px) scale(0.8); }
 60% { opacity: 1; transform: translateY(-10px) scale(1.05); }
 100% { opacity: 1; transform: translateY(0) scale(1); }
}
.btn:hover { transform: translateY(-3px) scale(1.03); box-shadow: 0 5px 20px rgba(34, 197, 94, 0.5); }
.btn.telegram { background: linear-gradient(135deg, #0088cc 0%, #006aa3 100%); color: white; }
.btn.channel { background: linear-gradient(135deg, #475569 0%, #334155 100%); color: white; }

/* Notifikasi klik buat aktifin suara */
#soundHint {
  position: absolute;
  bottom: 20px;
  font-size: 12px;
  color: #22c55e;
  opacity: 0;
  animation: fadeUp 1s 3.5s forwards;
}
</style>
</head>
<body>
<div id="particles"></div>

<div class="card">
  <img src="https://i.imgur.com/8Km9tLL.png" alt="Foto Profil">
  <h2>Admin FT CS FF</h2>
  <p>Umur 15 th | Bandar Lampung<br>Open Tourney FF Daily</p>
  
  <a class="btn" href="https://wa.me/62812XXXXXXX" target="_blank">📱 Chat WA Admin</a>
  <a class="btn channel" href="https://whatsapp.com/channel/xxx" target="_blank">📢 Saluran WA Tourney</a>
  <a class="btn telegram" href="https://t.me/usernamekamu" target="_blank">✈️ Chat Telegram</a>
  <a class="btn telegram channel" href="https://t.me/salurantourney" target="_blank">📢 Saluran Telegram</a>
</div>

<p id="soundHint">🔊 Tap layar buat aktifin suara villain</p>

<!-- Audio ketawa villain -->
<audio id="villainLaugh" preload="auto">
  <source src="https://cdn.pixabay.com/download/audio/2022/03/10/audio_d1718ab8f8.mp3?filename=evil-laugh-2-101533.mp3" type="audio/mpeg">
</audio>

<script>
// Generate partikel
const particles = document.getElementById('particles');
for(let i = 0; i < 30; i++) {
  let p = document.createElement('div');
  p.className = 'particle';
  p.style.left = Math.random() * 100 + '%';
  p.style.top = Math.random() * 100 + '%';
  p.style.animationDelay = Math.random() * 8 + 's';
  p.style.animationDuration = (5 + Math.random() * 5) + 's';
  particles.appendChild(p);
}

// Script suara villain pas portal muncul
const audio = document.getElementById('villainLaugh');
let soundPlayed = false;

function playVillainSound() {
  if(!soundPlayed) {
    audio.volume = 0.7; // gedein/kecilin di sini
    audio.play().catch(e => console.log('Sound blocked'));
    soundPlayed = true;
    document.getElementById('soundHint').style.display = 'none';
  }
}

// Muter suara pas user klik/touch layar pertama kali
document.addEventListener('click', playVillainSound);
document.addEventListener('touchstart', playVillainSound);

// Otomatis muter pas animasi portal selesai 1 detik
setTimeout(() => {
  audio.play().catch(() => {
    // Kalo ke-block, tunggu user klik
    console.log('Browser block autoplay, tunggu user tap');
  });
}, 1000);
</script>
</body>
</html>
